<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0b1a; --sidebar-bg: #110e1c; --border: #2a2040;
      --accent: #9b6dff; --accent2: #6c3fcf; --accent-soft: rgba(155,109,255,0.12);
      --text: #ede8ff; --muted: #7a6f99; --user-bubble: #1e1640;
      --orion-bubble: #17132b; --input-bg: #1a1530; --header-bg: #110e1c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100dvh; display: flex; overflow: hidden; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10; backdrop-filter: blur(2px); }
    .overlay.show { display: block; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 270px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 20; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .sidebar-top h2 { font-family: 'Sora', sans-serif; font-size: 18px; background: linear-gradient(135deg, var(--accent), #bf9bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .close-btn { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--muted); cursor: pointer; transition: background 0.15s; }
    .close-btn:hover { background: var(--accent-soft); color: var(--accent); }
    .search-bar { background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
    .search-bar input { background: transparent; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; }
    .search-bar input::placeholder { color: var(--muted); }
    .chat-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .chat-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.15s; border-radius: 10px; margin: 2px 8px; }
    .chat-item:hover { background: var(--accent-soft); }
    .chat-item.active { background: var(--accent-soft); border: 1px solid rgba(155,109,255,0.2); }
    .chat-item-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; box-shadow: 0 0 12px rgba(155,109,255,0.3); }
    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .chat-item-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--input-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .user-info p { font-size: 13px; font-weight: 500; }
    .user-info span { font-size: 11px; color: var(--muted); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; width: 100%; }
    .header { background: var(--header-bg); padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
    .menu-btn { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--muted); cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
    .menu-btn:hover { background: var(--accent-soft); color: var(--accent); }
    .header-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; box-shadow: 0 0 12px rgba(155,109,255,0.35); }
    .header-info { flex: 1; }
    .header-info h1 { font-size: 15px; font-weight: 600; }
    .header-info p { font-size: 12px; color: var(--accent); }
    .header-actions { display: flex; gap: 4px; }
    .header-btn { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--muted); cursor: pointer; transition: background 0.15s; }
    .header-btn:hover { background: var(--accent-soft); color: var(--accent); }
    .messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 10px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg-row { display: flex; align-items: flex-end; gap: 10px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .msg-row.orion .msg-avatar { background: linear-gradient(135deg, var(--accent2), var(--accent)); box-shadow: 0 0 8px rgba(155,109,255,0.3); }
    .msg-row.user .msg-avatar { background: var(--input-bg); border: 1px solid var(--border); }
    .bubble { max-width: 72%; padding: 11px 15px 8px; border-radius: 16px; font-size: 14px; line-height: 1.65; }
    .msg-row.orion .bubble { background: var(--orion-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg-row.user .bubble { background: var(--user-bubble); border: 1px solid rgba(155,109,255,0.2); border-bottom-right-radius: 4px; }
    .bubble-time { font-size: 10px; color: var(--muted); margin-top: 4px; display: block; }
    .msg-row.user .bubble-time { text-align: right; }
    .typing-row { display: flex; align-items: flex-end; gap: 10px; }
    .t-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .typing-bubble { background: var(--orion-bubble); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; padding: 13px 16px; display: flex; gap: 5px; }
    .typing-bubble span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.35; } 30% { transform: translateY(-6px); opacity: 1; } }
    .welcome { margin: auto; text-align: center; padding: 40px 20px; }
    .welcome-icon { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 18px; box-shadow: 0 0 32px rgba(155,109,255,0.35); }
    .welcome h2 { font-family: 'Sora', sans-serif; font-size: 22px; margin-bottom: 8px; }
    .welcome p { color: var(--muted); font-size: 13px; max-width: 280px; margin: 0 auto 24px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .suggestion { background: var(--orion-bubble); border: 1px solid var(--border); border-radius: 20px; padding: 8px 15px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .input-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--header-bg); display: flex; align-items: flex-end; gap: 10px; }
    .input-wrap { flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; display: flex; align-items: flex-end; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; min-height: 22px; max-height: 110px; line-height: 1.55; }
    textarea::placeholder { color: var(--muted); }
    .send-btn { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, var(--accent2), var(--accent)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 0 14px rgba(155,109,255,0.3); }
    .send-btn:hover { opacity: 0.9; transform: scale(1.04); }
    .send-btn:active { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-top">
      <h2>✦ Orion</h2>
      <div class="close-btn" onclick="closeSidebar()">✕</div>
    </div>
    <div class="search-bar"><span>🔍</span><input type="text" placeholder="Pesquisar..."/></div>
  </div>
  <div class="chat-list">
    <div class="chat-item active">
      <div class="chat-item-avatar">✦</div>
      <div class="chat-item-info">
        <div class="chat-item-name">Orion</div>
        <div class="chat-item-preview">Sua assistente inteligente</div>
      </div>
      <div class="chat-item-time">agora</div>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="user-avatar">👤</div>
    <div class="user-info"><p>Ryan</p><span>Online</span></div>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="menu-btn" onclick="openSidebar()">☰</div>
    <div class="header-avatar">✦</div>
    <div class="header-info"><h1>Orion</h1><p>● online agora</p></div>
    <div class="header-actions">
      <div class="header-btn">🔍</div>
      <div class="header-btn">⋮</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Oi, eu sou a Orion!</h2>
      <p>Sua assistente inteligente e descontraída. Me pergunta qualquer coisa 😊</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Quem é você?</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Me conta uma curiosidade</div>
        <div class="suggestion" onclick="sendSuggestion(this)">O que você sabe fazer?</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Me ajuda a estudar</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Manda mensagem pra Orion..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  let history = [];
  let isTyping = false;

  function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('show'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
  function now() { return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }); }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function sendSuggestion(el) { document.getElementById('input').value = el.textContent; sendMessage(); }

  function addMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatarEmoji = role === 'user' ? '👤' : '✦';
    row.innerHTML = `
      <div class="msg-avatar">${avatarEmoji}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}<span class="bubble-time">${now()}</span></div>
    `;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const container = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'typing-row'; row.id = 'typing';
    row.innerHTML = `<div class="t-avatar">✦</div><div class="typing-bubble"><span></span><span></span><span></span></div>`;
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    input.style.height = 'auto';
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || 'Ops, não consegui responder agora 😅';
      history.push({ role: 'assistant', content: reply });
      addMessage('orion', reply);
    } catch (err) {
      removeTyping();
      addMessage('orion', 'Eita, deu um erro aqui 😬 Tenta de novo!');
    }

    isTyping = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
</script>
</body>
</html>
